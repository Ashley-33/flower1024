<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>拾光花园</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#a9d98e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="拾光花园" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <div id="app">
    <button id="help" class="helpbtn" aria-label="帮助">?</button>
    <button id="sound" class="soundbtn" aria-label="声音开关">🔊</button>
    <header id="hud">
      <div class="topline"><span class="brand">🌸 拾光花园</span></div>
      <div id="energybar"><div id="energyfill"></div><span id="energytext"></span></div>
      <div class="stats"><span id="steps"></span><span id="cum"></span></div>
    </header>

    <div id="boardwrap">
      <canvas id="board"></canvas>
      <div id="overlay" class="hidden"></div>
    </div>

    <div id="speed" class="speed"></div>
    <div id="hint" class="hint"></div>
    <div id="items"></div>

    <footer class="bar">
      <button id="restart">🌱 重新开始</button>
    </footer>
    <p class="tip">滑动 / 方向键移动 · 点道具→点棋盘选目标 · 再点同一道具取消</p>
  </div>

  <div id="helpov" class="hidden"></div>
  <div id="toast" class="toast"></div>

  <!-- 加入主屏幕横幅 -->
  <div id="a2hs" class="a2hs hidden">
    <img src="icon-192.png" alt="" class="a2hs-ic" />
    <div class="a2hs-txt"><b>把「拾光花园」加到主屏幕</b><span id="a2hs-tip">像 App 一样一点就玩 🌸</span></div>
    <button id="a2hs-add" class="a2hs-add">添加</button>
    <button id="a2hs-close" class="a2hs-close" aria-label="关闭">✕</button>
  </div>

  <script src="petals.js?v=3"></script>
  <script src="config.js?v=12"></script>
  <script src="game.js?v=14"></script>
</body>
</html>
